name: Daily Commit

on:
  schedule:
    - cron: '0 0 * * *'  # Setiap hari jam 00:00 UTC

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Make daily commit
        run: |
          git config user.name "Natanael Vine Djapri"
          git config user.email "natanaelvinedj@gmail.com"
          echo "Last updated: $(date)" > last_updated.txt
          git add .
          git commit -m "chore: daily update $(date +'%Y-%m-%d')" || echo "Nothing to commit"
          git push